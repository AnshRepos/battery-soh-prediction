# ML Pipeline Configuration
# This file defines the overall pipeline behavior and model configurations

# Global settings
pipeline:
  name: Battery Dashboard ML Pipeline
  version: 1.0.0
  description: Comprehensive ML pipeline for battery prediction models
  environment: production

# Data processing configuration
data:
  train_test_split: 0.2
  random_state: 42
  preprocessing:
    handle_missing_values: true
    fill_method: 'ffill'
    remove_duplicates: true
    normalize: false
    scaler_type: 'standard'  # standard, minmax, robust

# Feature engineering
features:
  encoding_categorical: true
  one_hot_encode: false
  feature_selection: false
  max_features: null

# Model configurations
models:
  LogisticRegression:
    enabled: true
    class: LogisticRegression
    params:
      max_iter: 1000
      random_state: 42
      solver: 'lbfgs'
    description: Linear model for binary classification
  
  RandomForest:
    enabled: true
    class: RandomForest
    params:
      n_estimators: 100
      max_depth: 10
      random_state: 42
      n_jobs: -1
    description: Ensemble method using decision trees
  
  SVM:
    enabled: true
    class: SVM
    params:
      kernel: 'rbf'
      C: 1.0
      random_state: 42
    description: Support Vector Machine classifier
  
  GradientBoosting:
    enabled: true
    class: GradientBoosting
    params:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 5
      random_state: 42
    description: Gradient boosting classification model

# Training configuration
training:
  epochs: 10
  batch_size: 32
  validation_split: 0.1
  early_stopping: true
  early_stopping_patience: 5

# Evaluation metrics
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - roc_auc
  cross_validation_folds: 5

# Output and logging
output:
  model_save_path: ./models
  results_path: ./results
  log_path: ./logs
  export_format: 'joblib'  # joblib, pickle, onnx
  
# Logging configuration
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file_name: pipeline.log
  console_output: true
  max_file_size: 10485760  # 10MB
  backup_count: 5

# Hyperparameter tuning
hyperparameter_tuning:
  enabled: false
  method: 'grid'  # grid, random, bayesian
  cv_folds: 5
  n_trials: 100

# Advanced settings
advanced:
  use_gpu: false
  distributed_training: false
  model_versioning: true
  experiment_tracking: true
  save_predictions: true
  save_probabilities: true
